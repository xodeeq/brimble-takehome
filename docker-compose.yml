services:
  caddy:
    image: caddy:2-alpine
    # Override default Caddyfile entrypoint; load our JSON config directly.
    command: caddy run --config /etc/caddy/caddy.json
    ports:
      - "80:80"
    # 2019 is NOT published to the host — admin API is compose-internal only.
    volumes:
      - ./Caddyfile.json:/etc/caddy/caddy.json:ro
    networks:
      - brimble_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 2s
      timeout: 2s
      retries: 10

  api:
    build: ./apps/api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Named volume — required by the DooD volume-path constraint.
      # The daemon resolves mount paths on the HOST, not inside this container.
      # We pass this volume by name when spawning builder containers.
      - brimble_workspaces:/workspaces
      - brimble_data:/data
    networks:
      - brimble_net
    depends_on:
      caddy:
        condition: service_healthy
    environment:
      DB_PATH: /data/brimble.db
      PORT: "3000"

  ui:
    build: ./apps/ui
    networks:
      - brimble_net

  # BuildKit daemon — required by railpack build (BUILDKIT_HOST=docker-container://buildkitd).
  # Runs once; the API's builder containers connect to it via the Docker socket.
  buildkitd:
    image: moby/buildkit:latest
    container_name: buildkitd
    privileged: true
    networks:
      - brimble_net

  # The builder image (brimble-builder:latest) is NOT a long-lived service.
  # The API spawns a fresh builder container for each deployment, then removes it.
  # Build the image once before your first deployment:
  #   ./scripts/build-builder.sh
  # or: docker build apps/builder -t brimble-builder:latest

volumes:
  # Explicit names prevent docker-compose from prefixing with the project directory name.
  # The API references these volumes by name when spawning sibling containers (DooD trap — CLAUDE.md).
  brimble_workspaces:
    name: brimble_workspaces
  brimble_data:
    name: brimble_data

networks:
  brimble_net:
    driver: bridge
    # Explicit name for the same reason — API passes this to NetworkingConfig.EndpointsConfig.
    name: brimble_net
